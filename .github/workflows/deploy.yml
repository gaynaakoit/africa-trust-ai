name: Deploy to Vultr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v3

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Backend
      - name: Build backend
        run: |
          docker build -t africa-trust-backend ./backend/africa-trust-backend
          docker tag africa-trust-backend ${{ secrets.DOCKER_USERNAME }}/africa-trust-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/africa-trust-backend:latest

      # Frontend
      - name: Build frontend
        run: |
          docker build -t africa-trust-frontend ./frontend/africa-trust-frontend
          docker tag africa-trust-frontend ${{ secrets.DOCKER_USERNAME }}/africa-trust-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/africa-trust-frontend:latest

      # AI SERVICE
      - name: Build ai service
        run: |
          docker build -t africa-trust-ai-service ./ai-service
          docker tag africa-trust-ai-service ${{ secrets.DOCKER_USERNAME }}/africa-trust-ai-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/africa-trust-ai-service:latest

      # Deploy
      - name: Deploy on Vultr
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |

            cd /root/africa-trust-ai

            git reset --hard
            git pull origin main

            docker pull ${{ secrets.DOCKER_USERNAME }}/africa-trust-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/africa-trust-frontend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/africa-trust-ai-service:latest

            docker compose down
            docker compose up -d --force-recreate

            docker compose ps