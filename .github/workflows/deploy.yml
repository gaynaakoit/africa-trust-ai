name: Deploy to Vultr

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout du repo pour la build des images Docker
      - name: Checkout
        uses: actions/checkout@v3

      # 2️⃣ Login Docker
      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build et push backend
      - name: Build backend
        run: |
          docker build -t africa-trust-backend ./backend/africa-trust-backend
          docker tag africa-trust-backend ${{ secrets.DOCKER_USERNAME }}/africa-trust-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/africa-trust-backend:latest

      # 4️⃣ Build et push frontend
      - name: Build frontend
        run: |
          docker build -t africa-trust-frontend ./frontend/africa-trust-frontend
          docker tag africa-trust-frontend ${{ secrets.DOCKER_USERNAME }}/africa-trust-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/africa-trust-frontend:latest

      # 5️⃣ Build et push AI service
      - name: Build AI service
        run: |
          docker build -t africa-trust-ai-service ./ai-service
          docker tag africa-trust-ai-service ${{ secrets.DOCKER_USERNAME }}/africa-trust-ai-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/africa-trust-ai-service:latest

      # 6️⃣ Déploiement sur le serveur Vultr via SSH
      - name: Deploy on Vultr
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/africa-trust-ai

            # Stop et supprime tous les containers existants
            docker compose down --remove-orphans

            # Pull des dernières images depuis Docker Hub
            docker compose pull

            # Relancer les containers avec rebuild forcé et pull toujours
            docker compose up -d --force-recreate --pull always

            # Vérifier l’état
            docker compose ps