services:

  postgres:
    image: postgres:15
    container_name: africatrust-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SUPER_STRONG_PASSWORD
      POSTGRES_DB: africatrust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: africatrust-redis
    restart: unless-stopped
    networks:
      - app-network

  ai-service:
    image: warriorkod/africa-trust-ai-service:latest
    container_name: africatrust-ai
    restart: unless-stopped
    networks:
      - app-network

  backend:
    image: warriorkod/africa-trust-backend:latest
    container_name: africatrust-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - ai-service
    environment:
      DATABASE_URL: postgres://postgres:SUPER_STRONG_PASSWORD@postgres:5432/africatrust
      REDIS_HOST: redis
      AI_SERVICE_URL: http://ai-service:8000
    networks:
      - app-network

    frontend-app:
      image: warriorkod/africa-trust-frontend:latest
      container_name: africatrust-frontend-app
      restart: unless-stopped
      depends_on:
        - backend
      networks:
        - app-network
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost"]  # Vérifie que Nginx dans le container frontend répond
        interval: 5s
        retries: 10
        start_period: 10s

    nginx:
      image: nginx:latest
      container_name: africatrust-nginx
      restart: unless-stopped
      depends_on:
        frontend-app:
          condition: service_healthy  # attend que frontend soit UP
      ports:
        - "80:80"
        - "443:443"
      volumes:
        - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        - certbot_www:/var/www/certbot
        - certbot_conf:/etc/letsencrypt
      networks:
        - app-network

  certbot:
    image: certbot/certbot
    container_name: africatrust-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: >
      sh -c "trap exit TERM;
      while :; do
        certbot renew;
        sleep 12h & wait $${!};
      done"

networks:
  app-network:

volumes:
  postgres_data:
  certbot_www:
  certbot_conf: