<div class="flex h-screen overflow-hidden bg-gray-50">

    <!-- Sidebar mobile -->
    <aside
      class="fixed top-16 inset-y-0 left-0 z-40 w-64 bg-white border-r shadow-sm transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out"
      [ngClass]="{'translate-x-0': sidebarOpen, '-translate-x-full': !sidebarOpen}">
      
      <!-- Close button mobile -->
      <div class="flex justify-end px-4 py-3 md:hidden border-b">
        <button (click)="sidebarOpen = false" class="text-gray-600 hover:text-red-600 focus:outline-none">
          <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
  
      <div class="px-6 py-4 font-bold text-xl text-blue-700">API Services</div>
      <nav class="px-2 space-y-1">
        <button *ngFor="let service of services"
                (click)="selectService(service); sidebarOpen = false"
                [ngClass]="{'bg-blue-100 text-blue-800': selectedService === service, 'text-gray-700 hover:bg-gray-100': selectedService !== service}"
                class="w-full text-left px-4 py-2 rounded transition flex justify-between items-center">
          {{ service.name }}
          <span class="text-sm text-gray-500">&gt;</span>
        </button>
      </nav>
    </aside>
  
    <!-- Overlay mobile -->
    <div
      *ngIf="sidebarOpen"
      class="fixed inset-0 bg-black bg-opacity-25 z-30 md:hidden"
      (click)="sidebarOpen = false">
    </div>
  
    <!-- Main content -->
    <main class="flex-1 overflow-auto p-6 md:ml-64">
  
      <!-- Mobile sidebar toggle -->
      <div class="md:hidden mb-4">
        <button (click)="sidebarOpen = true" 
                class="flex items-center space-x-2 px-3 py-2 border rounded text-gray-700 hover:text-blue-600 hover:border-blue-300 focus:outline-none">
          
          <!-- Icône hamburger personnalisé -->
          <svg class="h-6 w-6" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="4" cy="6" r="1.5" />
            <circle cx="12" cy="6" r="1.5" />
            <circle cx="20" cy="6" r="1.5" />
            <circle cx="4" cy="12" r="1.5" />
            <circle cx="12" cy="12" r="1.5" />
            <circle cx="20" cy="12" r="1.5" />
            <circle cx="4" cy="18" r="1.5" />
            <circle cx="12" cy="18" r="1.5" />
            <circle cx="20" cy="18" r="1.5" />
          </svg>
      
          <!-- Texte -->
          <span class="font-medium">API Menu</span>
        </button>
      </div>
  
      <h1 class="text-2xl font-bold text-gray-800 mb-4">{{ selectedService.name }}</h1>
      <p class="text-gray-600 mb-6">{{ selectedService.description }}</p>
  
      <div *ngFor="let endpoint of selectedService.endpoints" class="mb-8">
        <h2 class="font-semibold text-lg text-gray-700 mb-2">{{ endpoint.method }} {{ endpoint.path }}</h2>
        <p class="text-gray-600 mb-2">{{ endpoint.description }}</p>
  
        <div class="mb-2">
          <span class="font-medium text-gray-700">Request:</span>
          <pre class="bg-gray-100 p-4 rounded text-sm text-gray-700 overflow-x-auto">{{ endpoint.requestBody }}</pre>
        </div>
  
        <div>
          <span class="font-medium text-gray-700">Response:</span>
          <pre class="bg-gray-100 p-4 rounded text-sm text-gray-700 overflow-x-auto">{{ endpoint.responseBody }}</pre>
        </div>
      </div>
    </main>
  </div>
