server {
    listen 80;
    server_name trust-ai.gaynaakoit.com www.trust-ai.gaynaakoit.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name trust-ai.gaynaakoit.com www.trust-ai.gaynaakoit.com;

    ssl_certificate /etc/letsencrypt/live/trust-ai.gaynaakoit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trust-ai.gaynaakoit.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;

    # FRONTEND
    location / {
        proxy_pass http://frontend-app:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # BACKEND API
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # AI SERVICE
    location /ai/ {
        proxy_pass http://ai-service:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}