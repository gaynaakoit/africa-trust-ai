# Déclaration des upstreams pour que Nginx résolve correctement les containers
upstream frontend {
    server africatrust-frontend-app:80;
}

upstream backend_api {
    server africatrust-backend:3000;
}

upstream ai_service {
    server africatrust-ai:8000;
}

# HTTP → HTTPS
server {
    listen 80;
    server_name trust-ai.gaynaakoit.com www.trust-ai.gaynaakoit.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirection vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS
server {
    listen 443 ssl;
    server_name trust-ai.gaynaakoit.com www.trust-ai.gaynaakoit.com;

    ssl_certificate /etc/letsencrypt/live/trust-ai.gaynaakoit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trust-ai.gaynaakoit.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # FRONTEND Angular SPA
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # BACKEND API NestJS
    location /api/ {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
    }

    # AI Service
    location /ai/ {
        proxy_pass http://ai_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;
    }
}